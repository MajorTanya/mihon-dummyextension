syntax = "proto3";

message Index {
  // Display name of the store (e.g. "Antsy's Epic Store").
  string name = 1;

  // Short identifier used to represent the store (e.g. "AES").
  string badgeLabel = 2;

  // Public signing key used to verify extension authenticity.
  string signingKey = 3;

  // Contact and community information for the store.
  Contact contact = 4;

  // List of all extensions published by this store,
  // or a URL linking to a extension list file.
  oneof extensions {
    ExtensionList extensionList = 101;
    string extensionListUrl = 102;
  }
}

message Contact {
  // Official website URL.
  string website = 1;

  // Discord invite or server URL.
  optional string discord = 2;
}

message ExtensionList {
  repeated Extension extensions = 1;
}

message Extension {
  // Extension display name.
  string name = 1;

  // Unique package name of the extension.
  string packageName = 2;

  // Downloadable resources for this extension.
  Resources resources = 3;

  // Version of the extension API in MAJOR.MINOR format.
  string extensionLib = 4;

  // Version code of the extension build.
  int64 versionCode = 5;

  // User facing version of the extension.
  string versionName = 6;

  // Content warning applicable for the extension.
  ContentWarning contentWarning = 7;

  // Sources provided by this extension.
  repeated Source sources = 8;
}

message Resources {
  // Direct APK download URL.
  string apkUrl = 1;

  // Icon image URL.
  string iconUrl = 2;
}

message Source {
  // Unique source identifier.
  int64 id = 1;

  // Display name of the source.
  string name = 2;

  // Primary language code (e.g. "en", "ja", "pt-BR").
  string language = 3;

  // Main website URL of the source.
  string homeUrl = 4;

  // Alternative home URLs for the source.
  repeated string mirrorUrls = 5;

  // Content warning applicable for the source.
  // ContentWarning contentWarning = 6;

  // Optional status or informational message shown for the source.
  // Supports Markdown formatting.
  optional string message = 7;
}

enum ContentWarning {
  CONTENT_WARNING_UNSPECIFIED = 0;

  // Contains only safe content.
  CONTENT_WARNING_SAFE = 1;

  // Might contain both safe and 18+ content.
  CONTENT_WARNING_MIXED = 2;

  // Primarily focused on 18+ content
  CONTENT_WARNING_NSFW = 3;
}